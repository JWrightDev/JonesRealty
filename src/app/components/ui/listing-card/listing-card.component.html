<a [attr.href]="(propertyItem.isLeased || propertyItem.isSold) ? null : propertyItem.listingLink" [attr.target]="(propertyItem.isLeased || propertyItem.isSold) ? null : '_blank'" [ngClass]="{'disabled': propertyItem.isLeased || propertyItem.isSold, 'hover:scale-105': !(propertyItem.isLeased || propertyItem.isSold), 'hover:grayscale': !(propertyItem.isLeased || propertyItem.isSold)}" class="transition-all duration-300 ease-in-out">
	<div class="relative m-8 transition-all duration-300 ease-in-out" [ngClass]="{'hover:scale-105': !(propertyItem.isLeased || propertyItem.isSold)}">
		<div class="absolute -inset-1 bg-black bg-opacity-75 rounded-lg border border-black border-opacity-75 grid place-items-center z-10 pointer-events-none" *ngIf="propertyItem.isLeased || propertyItem.isSold">
			<p class="text-3xl font-extrabold text-red-500">{{propertyItem.isSold ? 'Sold' : 'Leased'}}</p>
		</div>
		<div
			class="block rounded-lg bg-black text-white shadow-secondary-1 dark:bg-surface-dark">
			<img
				class="rounded-lg object-cover object-center opacity-25"
				src="{{propertyItem.thumbnailLink}}"
				alt="{{propertyItem.altText}}" />
			<div class="absolute top-[50%] left-[50%] translate-x-[-50%] translate-y-[-50%] bg-neutral-200/25 backdrop-blur rounded-lg px-8 py-4">
				<h5 class="text-xl font-medium leading-tight ">
					{{propertyItem.title}}
				</h5>
			</div>
		</div>
	</div>
</a>
